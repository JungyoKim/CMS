# CMS 애플리케이션 리버스 프록시 설정
server {
    listen 443 ssl http2;
    server_name cms.local cms.internal _;

    # SSL 인증서 설정
    # Synology에서 자체 서명 인증서를 사용하는 경우
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # 또는 Let's Encrypt 인증서 사용 시
    # ssl_certificate /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 파일 업로드 크기 제한 없음 (무제한)
    client_max_body_size 0;

    # 프록시 설정
    location / {
        proxy_pass http://cms:3000;
        proxy_http_version 1.1;
        
        # WebSocket 지원
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 프록시 헤더 설정 (중요: 리버스 프록시에서 필수)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 타임아웃 설정 (대용량 파일 업로드를 위해 충분히 큰 값 설정)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 대용량 파일 업로드를 위한 버퍼 설정
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # 정적 파일 캐싱 (선택사항)
    location /static {
        proxy_pass http://cms:3000;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # 로그 설정
    access_log /var/log/nginx/cms-access.log main;
    error_log /var/log/nginx/cms-error.log warn;
}















