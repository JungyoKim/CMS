version: '3.8'

services:
  cms:
    image: ${CMS_IMAGE:-cms:latest}
    container_name: cms
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_URL=/app/data/sqlite.db
      - BODY_SIZE_LIMIT=Infinity
    volumes:
      # 데이터베이스 파일 저장 (영구 보존)
      # 시놀로지에서는 /volume1/docker/cms/data 경로 사용
      - /volume1/docker/cms/data:/app/data
      # 업로드된 파일 저장 (영구 보존)
      # 시놀로지에서는 /volume1/docker/cms/uploads 경로 사용
      - /volume1/docker/cms/uploads:/app/uploads
    networks:
      - cms-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  cms-network:
    driver: bridge

